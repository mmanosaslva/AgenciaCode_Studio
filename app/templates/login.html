{% extends "base.html" %}
{% block title %}Inicio de Sesion{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-code-slash" style="font-size: 3rem; color: var(--bs-primary);"></i>
                    <h2 class="mt-2">AgenciaCode Studio</h2>
                    <p class="text-muted">Sistema de Gestion de Proyectos</p>
                </div>
                <form method="POST" action="{{ url_for('web.login') }}">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contrasena</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        <i class="bi bi-box-arrow-in-right"></i> Ingresar
                    </button>
                </form>
                <div class="mt-3 text-center text-muted small">
                    <p class="mb-0">Demo: admin / admin123</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
