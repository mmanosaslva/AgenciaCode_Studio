<!DOCTYPE html>
<html><body style="font-family:Inter,sans-serif;max-width:600px;margin:0 auto;padding:20px;">
<div style="background:linear-gradient(135deg,#6750A4,#EADDFF);padding:40px 20px;text-align:center;border-radius:16px 16px 0 0;">
    <h1 style="color:#fff;margin:0;font-size:24px;">AgenciaCode Studio</h1>
</div>
<div style="background:#fff;padding:32px 24px;border-radius:0 0 16px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    <h2 style="color:#1D1B20;margin:0 0 8px;">Nueva asignacion</h2>
    <p style="color:#49454F;line-height:1.6;">Hola {{ nombre }},</p>
    <p style="color:#49454F;line-height:1.6;">Has sido asignado al proyecto <strong>{{ proyecto_nombre }}</strong>.</p>
    <p style="color:#49454F;line-height:1.6;"><strong>Cliente:</strong> {{ cliente_nombre }}</p>
    <p style="color:#49454F;line-height:1.6;"><strong>Fecha:</strong> {{ fecha }}</p>
</div>
</body></html>
