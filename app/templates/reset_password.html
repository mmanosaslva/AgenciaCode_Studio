{% extends "base.html" %}
{% block title %}Nueva Contrasena{% endblock %}
{% block login_content %}
<div class="login-mesh">
    <div class="login-backdrop">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main style="width:100%; max-width:440px; padding: 16px; position:relative; z-index:1;">
        <div class="login-card">
            <div class="flex flex-col items-center" style="margin-bottom: var(--space-xl);">
                <div class="login-logo">
                    <span class="material-symbols-outlined">lock</span>
                </div>
                <h1 class="headline-sm text-center m-0">Nueva Contrasena</h1>
                <p class="body-sm text-center mt-sm m-0">Ingresa tu nueva contrasena</p>
            </div>

            <form method="POST" action="{{ url_for('web.reset_password', token=token) }}" style="display: flex; flex-direction: column; gap: var(--space-lg);">
                <div class="form-group">
                    <label class="form-label" for="password">Nueva Contrasena</label>
                    <div class="input-group relative">
                        <span class="input-icon material-symbols-outlined">lock</span>
                        <input class="form-input has-toggle" type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required minlength="8">
                        <button class="password-toggle" type="button" onclick="togglePassword()">
                            <span class="material-symbols-outlined" id="passIcon">visibility_off</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirmar Contrasena</label>
                    <div class="input-group relative">
                        <span class="input-icon material-symbols-outlined">lock</span>
                        <input class="form-input has-toggle" type="password" id="confirm_password" name="confirm_password" placeholder="Repite la contrasena" required minlength="8">
                        <button class="password-toggle" type="button" onclick="togglePassword2()">
                            <span class="material-symbols-outlined" id="passIcon2">visibility_off</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="padding: var(--space-md) var(--space-lg);">
                    <span class="material-symbols-outlined" style="font-size: 20px;">check</span>
                    <span>Cambiar contrasena</span>
                </button>
            </form>

            <div style="margin-top: var(--space-xl); padding-top: var(--space-lg); border-top: 1px solid var(--outline-variant); text-align: center;">
                <p class="body-sm text-on-surface-variant m-0">
                    <a class="label-md text-primary no-underline" href="{{ url_for('web.login') }}">Volver al inicio de sesion</a>
                </p>
            </div>
        </div>
    </main>
</div>

<script>
function togglePassword() {
    var input = document.getElementById('password');
    var icon = document.getElementById('passIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
    }
}
function togglePassword2() {
    var input = document.getElementById('confirm_password');
    var icon = document.getElementById('passIcon2');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
    }
}
</script>
{% endblock %}
