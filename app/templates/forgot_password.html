{% extends "base.html" %}
{% block title %}Recuperar Contrasena{% endblock %}
{% block login_content %}
<div class="login-mesh">
    <div class="login-backdrop">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main style="width:100%; max-width:440px; padding: 16px; position:relative; z-index:1;">
        <div class="login-card">
            <div class="flex flex-col items-center" style="margin-bottom: var(--space-xl);">
                <div class="login-logo">
                    <span class="material-symbols-outlined">lock_reset</span>
                </div>
                <h1 class="headline-sm text-center m-0">Recuperar Contrasena</h1>
                <p class="body-sm text-center mt-sm m-0">Ingresa tu email para recibir un enlace de recuperacion</p>
            </div>

            <form method="POST" action="{{ url_for('web.forgot_password') }}" style="display: flex; flex-direction: column; gap: var(--space-lg);">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-group">
                        <span class="input-icon material-symbols-outlined">email</span>
                        <input class="form-input" type="email" id="email" name="email" placeholder="correo@dominio.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="padding: var(--space-md) var(--space-lg);">
                    <span class="material-symbols-outlined" style="font-size: 20px;">send</span>
                    <span>Enviar enlace</span>
                </button>
            </form>

            <div style="margin-top: var(--space-xl); padding-top: var(--space-lg); border-top: 1px solid var(--outline-variant); text-align: center;">
                <p class="body-sm text-on-surface-variant m-0">
                    <a class="label-md text-primary no-underline" href="{{ url_for('web.login') }}">Volver al inicio de sesion</a>
                </p>
            </div>
        </div>
    </main>
</div>
{% endblock %}
